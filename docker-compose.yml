version: '3.8'

networks:
  frontend:
  backend:

services:
  redis:
    image: redis:7
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env} --appendonly yes --appendfsync everysec
    networks: [backend]
    volumes:
      - redis_data:/data
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M

  postgres:
    image: postgres:15
    restart: unless-stopped
    networks: [backend]
    environment:
      POSTGRES_DB: nowhere
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    networks: [frontend, backend]
    environment:
      REDIS_DSN: redis://:${REDIS_PASSWORD:?err}@redis:6379/0
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?err}@postgres:5432/nowhere
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      DEVICE_TOKEN_SECRET: ${DEVICE_TOKEN_SECRET:?Set DEVICE_TOKEN_SECRET in .env}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      DEBUG: ${DEBUG:-false}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M

  proxy:
    image: caddy:2
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    networks: [frontend]
    volumes:
      - ./infra/proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./app/dist:/srv/dist:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      NOWHERE_DOMAIN: ${NOWHERE_DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'

volumes:
  caddy_data:
  caddy_config:
  pgdata:
  redis_data:
