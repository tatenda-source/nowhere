name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          [ -f backend/requirements-test.txt ] && pip install -r backend/requirements-test.txt || true

      - name: Run tests
        env:
          REDIS_DSN: redis://localhost:6379/0
          JWT_SECRET: ci-test-secret
          DEVICE_TOKEN_SECRET: ci-test-secret
        run: python -m pytest backend/tests tests -v --tb=short

  backend-lint:
    name: Backend lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install ruff

      - name: Lint
        run: ruff check backend/

  frontend-typecheck:
    name: Frontend type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: app
        run: npm install

      - name: Type check
        working-directory: app
        run: npx tsc --noEmit

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend-test, backend-lint]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t nowhere-api .

  verify-stack:
    name: Stack integration
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Build and start stack
        run: docker compose up -d --build

      - name: Wait for services
        run: sleep 10

      - name: Health check
        run: curl -sf http://localhost:8000/health || (docker compose logs api && exit 1)

      - name: Tear down
        if: always()
        run: docker compose down --volumes --remove-orphans
